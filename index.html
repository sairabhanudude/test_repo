<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlitchShopperstop</title>
  <style>
    body { font-family: Arial; background:#f9fafb; padding:20px; }
    h1 { color:#111827; }
    .card { background:white; padding:20px; border-radius:10px; width:420px; }
    select, input { width:100%; padding:8px; margin-top:5px; }
    button { margin-top:10px; padding:10px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>GlitchShop</h1>
  <p>Find and fix the bugs.</p>

  <div class="card">
    <label>Product</label>
    <select id="product">
      <option value="chair">Chair - $50</option>
      <option value="desk">Desk - $150</option>
      <option value="lamp">Lamp - $30</option>
    </select>

    <br><br>
    <label>Quantity</label>
    <input id="qty" type="number" value="1">

    <br>
    <button onclick="buy()">Buy Now</button>

    <h2 id="total">Total: $0</h2>
    <p id="msg"></p>
  </div>

  <script>
    const prices = {
      chair: 50,
      desk: 150,
      lamp: 30
    };

    function buy() {
      let p = document.getElementById('product').value;
      let q = document.getElementById('qty').value;

      // BUG 1: Desk price wrong occasionally
      let price = prices[p];
      if (p === 'desk' && Math.random() > 0.8) price = 100;

      // BUG 2: String concatenation instead of multiplication for lamp
      let total;
      if (p === 'lamp') {
        total = price + q;
      } else {
        total = price * q;
      }

      // BUG 3: NaN not handled
      document.getElementById('total').innerText = "Total: $" + total;

      // BUG 4: Success message always shows
      document.getElementById('msg').innerText = "Purchase completed";

      // BUG 5: Message changes randomly later
      setTimeout(() => {
        if (Math.random() > 0.7) {
          document.getElementById('msg').innerText = "Error processing order";
        }
      }, 1500);

      // NEW BUG 6: Quantity treated as string in comparison
      if (q > "10") {
        document.getElementById('msg').innerText = "Bulk order detected";
      }

      // NEW BUG 7: Switching product doesn't reset previous total logic
      if (window.prevProduct && window.prevProduct !== p) {
        total = total + 5; // random extra charge
        document.getElementById('total').innerText = "Total: $" + total;
      }

      // NEW BUG 8: Incorrect discount logic
      if (p === 'chair' && q >= 3) {
        total = total - 100; // way too large discount
        document.getElementById('total').innerText = "Total: $" + total;
      }

      // NEW BUG 9: Quantity input mutated unexpectedly
      if (p === 'desk') {
        document.getElementById('qty').value = q * 2;
      }

      // BUG 10: Hidden state bug
      window.prevProduct = p;
    }
  </script>
</body>
</html>
