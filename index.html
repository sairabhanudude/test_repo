<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlitchShop</title>
  <style>
    body { font-family: Arial; background:#f9fafb; padding:20px; }
    h1 { color:#111827; }
    .card { background:white; padding:20px; border-radius:10px; width:420px; }
    select, input { width:100%; padding:8px; margin-top:5px; }
    button { margin-top:10px; padding:10px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>GlitchShop</h1>
  <p>Find and fix the bugs.</p>

  <div class="card">
    <label>Product</label>
    <select id="product">
      <option value="chair">Chair - $50</option>
      <option value="desk">Desk - $150</option>
      <option value="lamp">Lamp - $30</option>
    </select>

    <br><br>
    <label>Quantity</label>
    <input id="qty" type="number" value="1">

    <br>
    <button onclick="buy()">Buy Now</button>

    <h2 id="total">Total: $0</h2>
    <p id="msg"></p>
  </div>

  <script>
    const prices = {
      chair: 50,
      desk: 150,
      lamp: 30
    };

    function buy() {
      let p = document.getElementById('product').value;
      let q = document.getElementById('qty').value;

      // BUG 1: Desk price wrong occasionally
      let price = prices[p];
      if (p === 'desk' && Math.random() > 0.8) price = 100;

      // BUG 2: String concatenation instead of multiplication for lamp
      let total;
      if (p === 'lamp') {
        total = price + q;
      } else {
        total = price * q;
      }

      // BUG 3: NaN not handled
      document.getElementById('total').innerText = "Total: $" + total;

      // BUG 4: Success message always shows
      document.getElementById('msg').innerText = "Purchase completed";

      // BUG 5: Message changes randomly later
      setTimeout(() => {
        if (Math.random() > 0.7) {
          document.getElementById('msg').innerText = "Error processing order";
        }
      }, 1500);

      // BUG 6: Large quantity breaks UI
      if (q > 1000) {
        document.getElementById('total').innerText = "Total: $" + (total / 0);
      }

      // BUG 7: DOM overwrite using innerHTML (unsafe)
      if (p === 'chair') {
        document.getElementById('total').innerHTML = "Total: <b>$" + total + "</b>";
      }

      // BUG 8: Hidden logic bug
      if (q == "2") {
        document.getElementById('msg').innerText = "Special discount applied";
      }

      // BUG 9: Floating precision issue
      if (p === 'lamp') {
        document.getElementById('total').innerText = "Total: $" + (0.1 + 0.2) * q;
      }

      // BUG 10: Inconsistent state when switching products quickly
      window.lastProduct = p;
    }
  </script>
</body>
</html>
