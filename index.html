<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electro Mart</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    #resetFlash { position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                  border: 5px solid transparent; pointer-events: none; }
  </style>
</head>
<body>
  <h1>ElectroMart</h1>
  <p>Choose products and quantities below.</p>

  <table>
    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>In Stock</th>
        <th>Quantity</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Smartphone</td>
        <td>$699</td>
        <td id="stock-phone">15</td>
        <td><input id="qty-phone" type="number" min="0" value="0"></td>
      </tr>
      <tr>
        <td>Laptop</td>
        <td>$1199</td>
        <td id="stock-laptop">8</td>
        <td><input id="qty-laptop" type="number" min="0" value="0"></td>
      </tr>
      <tr>
        <td>Headphones</td>
        <td>$199</td>
        <td id="stock-headphones">25</td>
        <td><input id="qty-headphones" type="number" min="0" value="0"></td>
      </tr>
      <tr>
        <td>Tablet</td>
        <td>$499</td>
        <td id="stock-tablet">12</td>
        <td><input id="qty-tablet" type="number" min="0" value="0"></td>
      </tr>
    </tbody>
  </table>

  <button id="checkoutBtn">Checkout</button>

  <h2>Total: $<span id="total">0</span></h2>

  <div id="resetFlash"></div>

  <script>
    // Default stocks for admin reset
    const defaultStock = {
      phone: 15,
      laptop: 8,
      headphones: 25,
      tablet: 12
    };

    // Restore from localStorage
    function loadState() {
      const saved = JSON.parse(localStorage.getItem("estore"));
      if (saved) {
        document.getElementById("stock-phone").textContent = saved.phone;
        document.getElementById("stock-laptop").textContent = saved.laptop;
        document.getElementById("stock-headphones").textContent = saved.headphones;
        document.getElementById("stock-tablet").textContent = saved.tablet;
      }
    }
    loadState();

    function saveState() {
      const state = {
        phone: parseInt(document.getElementById("stock-phone").textContent),
        laptop: parseInt(document.getElementById("stock-laptop").textContent),
        headphones: parseInt(document.getElementById("stock-headphones").textContent),
        tablet: parseInt(document.getElementById("stock-tablet").textContent)
      };
      localStorage.setItem("estore", JSON.stringify(state));
    }

    document.getElementById("checkoutBtn").addEventListener("click", () => {
      const phone = parseInt(document.getElementById("qty-phone").value);
      const laptop = parseInt(document.getElementById("qty-laptop").value);
      const headphones = parseInt(document.getElementById("qty-headphones").value);
      const tablet = parseInt(document.getElementById("qty-tablet").value);

      // BUGS intentionally included (not listed here for brevity)

      let total = phone * 699 + laptop * 1199 + headphones * 199 + tablet * 499;
      document.getElementById("total").textContent = total;

      // Reduce stock
      document.getElementById("stock-phone").textContent -= phone;
      document.getElementById("stock-laptop").textContent -= laptop;
      document.getElementById("stock-headphones").textContent -= headphones;
      document.getElementById("stock-tablet").textContent -= tablet;

      saveState();
    });

    // Hidden Admin Reset CTRL + ALT + R
    document.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.altKey && e.key === "r") {
        localStorage.removeItem("estore");

        document.getElementById("stock-phone").textContent = defaultStock.phone;
        document.getElementById("stock-laptop").textContent = defaultStock.laptop;
        document.getElementById("stock-headphones").textContent = defaultStock.headphones;
        document.getElementById("stock-tablet").textContent = defaultStock.tablet;

        const flash = document.getElementById("resetFlash");
        flash.style.borderColor = "lime";
        setTimeout(() => flash.style.borderColor = "transparent", 300);

        saveState();
      }
    });
  </script>
</body>
</html>
